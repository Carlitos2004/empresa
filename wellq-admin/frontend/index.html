<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Viewport para diseño responsivo en móviles y tablets -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon de la aplicación -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Preconectar a Google Fonts para reducir latencia -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fuente principal Inter + JetBrains Mono para código -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>WellQ Admin Console</title>
  </head>
  <body class="bg-slate-light text-slate-dark antialiased">
    <!-- Punto de montaje de la aplicación Vue -->
    <div id="app"></div>
    <!-- Vite inyecta el JS aquí automáticamente en build -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
